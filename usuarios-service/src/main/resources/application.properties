spring.application.name=usuarios-service
server.port=8081

# Datasource (se sobreescribe con variables de entorno en docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/usuarios}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:usuarios}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:usuarios}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
