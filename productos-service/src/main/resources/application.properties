spring.application.name=productos-service
server.port=8082

# Datasource (se sobreescribe con variables de entorno en docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:productos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:productos}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
