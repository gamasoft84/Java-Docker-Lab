spring.application.name=pedidos-service
server.port=8083

# URLs de los otros microservicios.
# Por defecto apuntan a localhost (util al correr fuera de Docker).
# En docker-compose se sobreescriben con variables de entorno
# (SERVICIOS_USUARIOS_URL y SERVICIOS_PRODUCTOS_URL) usando los nombres de servicio.
servicios.usuarios.url=http://localhost:8081
servicios.productos.url=http://localhost:8082

# Datasource (se sobreescribe con variables de entorno en docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pedidos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pedidos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pedidos}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
